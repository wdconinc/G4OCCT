# Verify that the CMakeLists.txt project version matches the Git tag being pushed.
# Runs only on v* tag pushes; fails fast if the versions diverge, preventing a
# mismatched release from being published.

name: Version check

permissions:
  contents: read

on:
  push:
    tags: ['v*']

jobs:
  version-check:
    name: CMakeLists version matches tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract CMakeLists version
        id: cmake_ver
        run: |
          # Extract version from the project() block (handles multi-line project() calls).
          # sed extracts lines from 'project(' through the closing ')'; grep then finds VERSION.
          ver=$(sed -n '/^[[:space:]]*project[[:space:]]*(/,/)/p' CMakeLists.txt \
                | grep -oE 'VERSION[[:space:]]+[0-9]+\.[0-9]+\.[0-9]+' \
                | sed -E 's/VERSION[[:space:]]*//')
          if [ -z "$ver" ]; then
            echo "::error::Failed to parse project(VERSION ...) from CMakeLists.txt."
            echo "::error::Ensure CMakeLists.txt contains a line like: project(<name> VERSION X.Y.Z ...)."
            exit 1
          fi
          echo "cmake_version=$ver" >> "$GITHUB_OUTPUT"

      - name: Compare to tag
        run: |
          tag="${GITHUB_REF_NAME}"          # e.g. v0.1.0
          expected="v${{ steps.cmake_ver.outputs.cmake_version }}"
          echo "Git tag   : $tag"
          echo "CMakeLists: $expected"
          if [ "$tag" != "$expected" ]; then
            echo "::error::Tag '$tag' does not match CMakeLists.txt version '$expected'."
            echo "::error::Update project(VERSION ...) in CMakeLists.txt before tagging."
            exit 1
          fi
          echo "Versions match — OK."
