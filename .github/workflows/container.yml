name: Container

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build-container:
    name: Build and push G4OCCT container
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Spack
        uses: spack/setup-spack@v3
        with:
          spack_ref: releases/v1.1
          buildcache: false

      - name: Install spack environment from EIC buildcache
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: spack-bash {0}
        run: spack -e .github install

      - name: Extract container metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/eic/g4occt
          tags: |
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Push G4OCCT container image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAGS=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAGS+=("$tag")
          done <<< "${{ steps.meta.outputs.tags }}"
          # spack buildcache push --tag expects only the tag portion (e.g. sha-abc1234),
          # not the full image reference; strip the registry+repo prefix.
          FIRST_TAG="${TAGS[0]#*:}"
          spack -e .github buildcache push \
            --base-image ubuntu:24.04 \
            --tag "${FIRST_TAG}" \
            --update-index \
            oci://ghcr.io/eic/g4occt
          for tag in "${TAGS[@]:1}"; do
            docker buildx imagetools create \
              --tag "${tag}" \
              "${TAGS[0]}"
          done
