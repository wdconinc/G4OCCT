name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  build-test-benchmark:
    name: Build, test, and benchmark (eic_xl)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch NIST CTC STEP fixtures
        uses: ./.github/actions/fetch-nist-ctc

      - name: Install CVMFS
        uses: cvmfs-contrib/github-action-cvmfs@v5

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: |
            _fetchcontent/*-src
            _fetchcontent/*-subbuild
          key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt') }}

      - name: Build, test, and install inside eic_xl container
        uses: eic/run-cvmfs-osg-eic-shell@v1
        with:
          platform-release: "eic_xl:nightly"
          run: |
            set -euo pipefail

            # ── Configure ──────────────────────────────────────────────────
            cmake -S . -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_TESTING=ON \
              -DBUILD_BENCHMARKS=ON \
              -DBUILD_EXAMPLES=ON \
              -DENABLE_WERROR=ON \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DCMAKE_INSTALL_PREFIX="${PWD}/install" \
              -DFETCHCONTENT_BASE_DIR="${PWD}/_fetchcontent"

            # ── Build ──────────────────────────────────────────────────────
            cmake --build build -- -j$(nproc)

            # ── Test ───────────────────────────────────────────────────────
            ctest --test-dir build --output-on-failure \
              --output-junit "${PWD}/test-results.xml" \
              --exclude-regex "^render_geometry_fixtures" \
              -j$(nproc)

            # ── Render fixture solids to JPEG via Geant4 RayTracer ──────────
            # Per-fixture render tests (render_geometry_fixtures/<family>/<id>)
            # run serially (RUN_SERIAL) with a 120 s per-fixture timeout so a
            # slow or stuck fixture doesn't block CI.  The overall invocation
            # uses || echo so a failed render does not fail the CI step.
            mkdir -p build/geometry_renders
            ctest --test-dir build --output-on-failure \
              -R "^render_geometry_fixtures/" \
              || echo "WARNING: one or more render_geometry_fixtures tests did not complete (non-critical)"

            # ── Benchmark + point-cloud export ─────────────────────────────
            # Write Google Benchmark JSON to a file (--benchmark_out) to avoid
            # mixing it with any stdout output from Geant4/OCCT during benchmark
            # execution, which would corrupt a piped JSON stream.
            ./build/src/benchmarks/bench_navigator \
              --benchmark_out=bench_raw.json \
              --benchmark_out_format=json \
              2048 \
              src/tests/fixtures/geometry/manifest.yaml \
              point_clouds/

            # ── Assembly GDML vs STEP benchmark ────────────────────────────
            # Run each fixture in its own process for full Geant4 state
            # isolation (material table, solid store, logical-volume store).
            # Each invocation writes bench_assembly_raw_<fixture_id>.json;
            # the report generator merges them via a glob pattern.
            # The STEP fixture (shape.step) must be committed to the repository
            # (generated by regenerate.sh using DRAWEXE or generate.py).
            # The benchmark is only built when Geant4 was compiled with GDML
            # support; skip gracefully when it is absent.
            if [ -f ./build/src/benchmarks/bench_assembly_navigator ]; then
              for fixture_dir in src/tests/fixtures/assembly-comparison/*; do
                [ -d "${fixture_dir}" ] || continue
                fixture_id=$(basename "${fixture_dir}")
                # Pre-filter: skip incomplete fixtures without spawning a process
                # (the binary also handles missing files gracefully, but this
                # avoids the overhead of launching with nothing to benchmark).
                [ -f "${fixture_dir}/geometry.gdml" ] || continue
                [ -f "${fixture_dir}/shape.step" ]    || continue
                # Benchmarks are not gatekeepers: a single fixture failure must
                # not block the remaining fixtures or the install step.
                ./build/src/benchmarks/bench_assembly_navigator \
                  --benchmark_out="bench_assembly_raw_${fixture_id}.json" \
                  --benchmark_out_format=json \
                  2048 \
                  "${fixture_dir}" \
                  point_clouds/ \
                  || echo "Warning: bench_assembly_navigator failed for fixture ${fixture_id}"
              done
            else
              echo "bench_assembly_navigator not built (Geant4 GDML support absent)"
            fi

            # ── Copy render output for report generation ────────────────────
            mkdir -p reports/geometry-images
            if [ -d build/geometry_renders ] && \
               [ -n "$(ls build/geometry_renders/*.jpeg 2>/dev/null)" ]; then
              cp build/geometry_renders/*.jpeg reports/geometry-images/
            fi

            # ── Install ────────────────────────────────────────────────────
            cmake --install build

      - name: Run examples inside eic_xl container
        uses: eic/run-cvmfs-osg-eic-shell@v1
        with:
          platform-release: "eic_xl:nightly"
          run: |
            set -euo pipefail
            mkdir -p example_logs

            # ── B1 — Water Phantom ─────────────────────────────────────────
            set +e
            ./build/src/examples/B1/exampleB1 \
              "${PWD}/src/examples/B1/run.mac" \
              > example_logs/B1.log 2>&1
            B1_EXIT=$?
            set -e
            echo "$B1_EXIT" > example_logs/B1.exit

            # ── B4c — Sampling Calorimeter ─────────────────────────────────
            set +e
            ./build/src/examples/B4c/exampleB4c \
              -m "${PWD}/src/examples/B4c/exampleB4.in" \
              > example_logs/B4c.log 2>&1
            B4C_EXIT=$?
            set -e
            echo "$B4C_EXIT" > example_logs/B4c.exit

            # Fail the step if any example exited with an error
            [ "$B1_EXIT" -eq 0 ] && [ "$B4C_EXIT" -eq 0 ]

      - name: Upload STEP fixtures to Onshape
        if: always()
        env:
          ONSHAPE_ACCESS_KEY: ${{ secrets.ONSHAPE_ACCESS_KEY }}
          ONSHAPE_SECRET_KEY: ${{ secrets.ONSHAPE_SECRET_KEY }}
        run: |
          (pip3 install --quiet requests pyyaml &&
          python3 .github/scripts/upload_step_to_onshape.py \
            src/tests/fixtures/geometry/manifest.yaml \
            reports/onshape_links.json) || true

      - name: Generate Markdown reports
        if: always()
        run: |
          pip3 install --quiet jinja2
          python3 .github/scripts/generate_test_report.py \
            test-results.xml reports/test-results.md
          python3 .github/scripts/generate_bench_report.py \
            bench_raw.json reports/bench-results.md reports/point_cloud_viewer.html \
            reports/onshape_links.json
          python3 .github/scripts/generate_assembly_report.py \
            "bench_assembly_raw_*.json" reports/bench-assembly-results.md \
            reports/point_cloud_viewer.html
          python3 .github/scripts/generate_point_cloud_report.py \
            point_clouds/ reports/point_cloud_viewer.html
          python3 .github/scripts/generate_example_report.py \
            example_logs/ reports/example-logs.md
          python3 .github/scripts/generate_geometry_image_report.py \
            reports/geometry-images/ reports/geometry-images.html

      - name: Post reports as step summary
        if: always()
        run: |
          if [ -f reports/test-results.md ]; then
            cat reports/test-results.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f reports/bench-results.md ]; then
            cat reports/bench-results.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f reports/bench-assembly-results.md ]; then
            cat reports/bench-assembly-results.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f reports/point_cloud_viewer.html ]; then
            echo "[Point-cloud viewer](./reports/point_cloud_viewer.html)" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f reports/example-logs.md ]; then
            head -n 400 reports/example-logs.md >> "$GITHUB_STEP_SUMMARY" || true
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> Full example logs are available in the \`ci-reports\` artifact." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test and benchmark reports as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-reports
          path: |
            reports/
            bench_raw.json
          if-no-files-found: ignore
          retention-days: 1

      - name: Generate PR diff for clang-tidy
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git fetch --depth=1 origin ${{ github.event.pull_request.base.sha }}
          git diff FETCH_HEAD HEAD > pr.diff

      - name: Run clang-tidy on changed files
        uses: eic/run-cvmfs-osg-eic-shell@v1
        if: ${{ github.event_name == 'pull_request' }}
        with:
          platform-release: "eic_xl:nightly"
          run: |
            set -euo pipefail
            CLANG_TIDY_DIFF=$(command -v clang-tidy-diff || command -v clang-tidy-diff.py)
            "$CLANG_TIDY_DIFF" -p 1 -path build -quiet \
              -export-fixes clang_tidy_fixes.yaml \
              -extra-arg='-std=c++20' < pr.diff || true

      - name: Run clang-tidy on all files
        uses: eic/run-cvmfs-osg-eic-shell@v1
        if: ${{ github.event_name != 'pull_request' }}
        with:
          platform-release: "eic_xl:nightly"
          run: |
            set -euo pipefail
            run-clang-tidy -p build -export-fixes clang_tidy_fixes.yaml \
              -extra-arg='-std=c++20' || true

      - name: Upload clang-tidy fixes as artifact
        uses: actions/upload-artifact@v7
        with:
          name: clang-tidy-fixes
          path: clang_tidy_fixes.yaml
          if-no-files-found: ignore

      - name: Suggest clang-tidy fixes as PR comments
        uses: platisd/clang-tidy-pr-comments@v1.8.0
        if: ${{ github.event_name == 'pull_request' && always() }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          clang_tidy_fixes: clang_tidy_fixes.yaml
          request_changes: false
          suggestions_per_comment: 10

  callgrind:
    name: Callgrind profile (${{ matrix.fixture.name }}, eic_xl)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        fixture:
          - name: g4box
            id: g4box-box-20x30x40-v1
            family: direct-primitives
          - name: g4unionsolid
            id: g4unionsolid-box-overlap-x10-v1
            family: boolean-compound
          - name: g4tessellatedsolid
            id: g4tessellatedsolid-tessellated-tet-right-20x30x40-v1
            family: tessellated
          - name: g4twistedbox
            id: g4twistedbox-box-dx10-dy8-z20-phi30-v1
            family: twisted-swept
          - name: g4ellipsoid
            id: g4ellipsoid-ellipsoid-15x10x20-v1
            family: profile-faceted
          - name: g4displacedsolid
            id: g4displacedsolid-translated-box-offset-v1
            family: wrapper-decorator
          - name: nist-ctc-01
            id: nist-ctc-01-v1
            family: nist-ctc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch NIST CTC STEP fixtures
        if: contains(matrix.fixture.id, 'nist-ctc')
        uses: ./.github/actions/fetch-nist-ctc

      - name: Verify NIST CTC STEP fixtures
        if: contains(matrix.fixture.id, 'nist-ctc')
        run: |
          set -euo pipefail
          FIXTURE_STEP="src/tests/fixtures/geometry/nist-ctc/G4OCCTSolid/${{ matrix.fixture.id }}/shape.step"
          if [ ! -f "${FIXTURE_STEP}" ]; then
            echo "::error title=NIST CTC fixture missing::Expected STEP file '${FIXTURE_STEP}' not found. The NIST CTC fetch action may have failed; aborting callgrind profiling for this fixture."
            exit 1
          fi

      - name: Install CVMFS
        uses: cvmfs-contrib/github-action-cvmfs@v5

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: |
            _fetchcontent/*-src
            _fetchcontent/*-subbuild
          key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt') }}

      - name: Build, profile, and annotate inside eic_xl container
        uses: eic/run-cvmfs-osg-eic-shell@v1
        with:
          platform-release: "eic_xl:nightly"
          run: |
            set -euo pipefail

            # ── Configure ──────────────────────────────────────────────────
            # RelWithDebInfo retains debug symbols so callgrind_annotate can
            # map instruction costs back to source lines.
            # VALGRIND_INCLUDE_DIR points find_path() to the valgrind headers
            # provided by the container's valgrind installation at /opt/local.
            cmake -S . -B build \
              -DCMAKE_BUILD_TYPE=RelWithDebInfo \
              -DBUILD_BENCHMARKS=ON \
              -DENABLE_WERROR=ON \
              -DCMAKE_INSTALL_PREFIX="${PWD}/install" \
              -DVALGRIND_INCLUDE_DIR=/opt/local/include \
              -DFETCHCONTENT_BASE_DIR="${PWD}/_fetchcontent"

            # ── Build ──────────────────────────────────────────────────────
            cmake --build build --target bench_callgrind -- -j$(nproc)

            # ── Profile ────────────────────────────────────────────────────
            # --instr-atstart=no: instrumentation off at launch; the binary
            # enables it via CALLGRIND_START_INSTRUMENTATION once the hot
            # loop starts, so setup and STEP-import costs are excluded.
            # --collect-atstart=no: collection also off at launch; the binary
            # enables it via CALLGRIND_TOGGLE_COLLECT so only the hot loop
            # contributes to the callgrind profile.
            valgrind --tool=callgrind \
              --instr-atstart=no \
              --collect-atstart=no \
              --callgrind-out-file=callgrind.out \
              ./build/src/benchmarks/bench_callgrind \
                "${{ matrix.fixture.id }}" \
                src/tests/fixtures/geometry/manifest.yaml

            # ── Annotate ───────────────────────────────────────────────────
            mkdir -p reports
            # Copy the raw callgrind output for offline analysis with kcachegrind.
            cp callgrind.out reports/callgrind_${{ matrix.fixture.name }}.out
            callgrind_annotate --auto=yes \
              --include="${PWD}/src" \
              --include="${PWD}/include" \
              callgrind.out \
              > reports/callgrind_annotate_${{ matrix.fixture.name }}.txt
            # Print a short summary to the step log for quick inspection
            # (60 lines covers the callgrind header and top call-site table).
            head -60 reports/callgrind_annotate_${{ matrix.fixture.name }}.txt || true

      - name: Upload callgrind reports as artifact
        id: upload-callgrind-reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: callgrind-reports-${{ matrix.fixture.name }}
          path: |
            reports/callgrind_annotate_${{ matrix.fixture.name }}.txt
            reports/callgrind_${{ matrix.fixture.name }}.out
          if-no-files-found: warn
          retention-days: 7

      - name: Write callgrind links JSON
        if: always()
        run: |
          mkdir -p callgrind-links
          printf '{"${{ matrix.fixture.family }}/${{ matrix.fixture.id }}": "%s"}\n' \
            "${{ steps.upload-callgrind-reports.outputs.artifact-url }}" \
            > callgrind-links/callgrind_links_${{ matrix.fixture.name }}.json

      - name: Upload callgrind links as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: callgrind-links-${{ matrix.fixture.name }}
          path: callgrind-links/callgrind_links_${{ matrix.fixture.name }}.json
          if-no-files-found: warn
          retention-days: 7

  callgrind-assembly:
    name: Callgrind profile (string-array-v1 assembly, eic_xl)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install CVMFS
        uses: cvmfs-contrib/github-action-cvmfs@v5

      - name: Build, profile, and annotate inside eic_xl container
        uses: eic/run-cvmfs-osg-eic-shell@v1
        with:
          platform-release: "eic_xl:nightly"
          run: |
            set -euo pipefail

            # ── Configure ──────────────────────────────────────────────────
            # RelWithDebInfo retains debug symbols so callgrind_annotate can
            # map instruction costs back to source lines.
            # VALGRIND_INCLUDE_DIR points find_path() to the valgrind headers
            # provided by the container's valgrind installation at /opt/local.
            cmake -S . -B build \
              -DCMAKE_BUILD_TYPE=RelWithDebInfo \
              -DBUILD_BENCHMARKS=ON \
              -DENABLE_WERROR=ON \
              -DCMAKE_INSTALL_PREFIX="${PWD}/install" \
              -DVALGRIND_INCLUDE_DIR=/opt/local/include

            # ── Build ──────────────────────────────────────────────────────
            cmake --build build --target bench_assembly_navigator -- -j$(nproc)

            # ── Profile ────────────────────────────────────────────────────
            # Single-fixture mode: pass the fixture directory directly so that
            # only string-array-v1 is loaded, keeping the profile uncontaminated
            # by other fixture preloading costs.
            # --instr-atstart=no / --collect-atstart=no: bench_assembly_navigator
            #   uses CALLGRIND_START_INSTRUMENTATION + CALLGRIND_TOGGLE_COLLECT to
            #   gate collection around benchmark::RunSpecifiedBenchmarks(), excluding
            #   GDML parse, STEP import, and geometry construction from the profile.
            # --benchmark_iterations=1: one iteration per benchmark variant keeps
            #   the callgrind run fast while still profiling the full navigation loop.
            valgrind --tool=callgrind \
              --instr-atstart=no \
              --collect-atstart=no \
              --callgrind-out-file=callgrind.out \
              ./build/src/benchmarks/bench_assembly_navigator \
                --benchmark_iterations=1 \
                2048 \
                src/tests/fixtures/assembly-comparison/string-array-v1

            # ── Annotate ───────────────────────────────────────────────────
            mkdir -p reports
            cp callgrind.out reports/callgrind_assembly.out
            callgrind_annotate --auto=yes \
              --include="${PWD}/src" \
              --include="${PWD}/include" \
              callgrind.out \
              > reports/callgrind_annotate_assembly.txt
            head -60 reports/callgrind_annotate_assembly.txt || true

      - name: Upload callgrind reports as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: callgrind-reports-assembly
          path: |
            reports/callgrind_annotate_assembly.txt
            reports/callgrind_assembly.out
          if-no-files-found: warn
          retention-days: 7

  callgrind-b4c:
    name: Callgrind profile (B4c G4OCCTSolid, eic_xl)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install CVMFS
        uses: cvmfs-contrib/github-action-cvmfs@v5

      - name: Build, profile, and annotate inside eic_xl container
        uses: eic/run-cvmfs-osg-eic-shell@v1
        with:
          platform-release: "eic_xl:nightly"
          run: |
            set -euo pipefail

            # ── Configure ──────────────────────────────────────────────────
            # RelWithDebInfo retains debug symbols for source-level annotation.
            # B4C_CHECK_OVERLAPS=OFF: prevents Inside() calls during placement
            # overlap checking from inflating the profiled call counts.
            # BUILD_EXAMPLES=ON: required to generate the exampleB4c target.
            # BUILD_TESTING=OFF / BUILD_BENCHMARKS=OFF: skip unneeded targets.
            cmake -S . -B build \
              -DCMAKE_BUILD_TYPE=RelWithDebInfo \
              -DBUILD_EXAMPLES=ON \
              -DBUILD_TESTING=OFF \
              -DBUILD_BENCHMARKS=OFF \
              -DENABLE_WERROR=ON \
              -DB4C_CHECK_OVERLAPS=OFF \
              -DVALGRIND_INCLUDE_DIR=/opt/local/include \
              -DCMAKE_INSTALL_PREFIX="${PWD}/install"

            # ── Build ──────────────────────────────────────────────────────
            cmake --build build --target exampleB4c -- -j$(nproc)

            # ── Profile ────────────────────────────────────────────────────
            # RunAction wraps BeginOfRunAction/EndOfRunAction with CALLGRIND
            # macros so geometry construction (STEP import, BVH build, overlap
            # check) and physics initialisation are excluded from the profile.
            # --instr-atstart=no: Valgrind does not instrument code before the
            #   first CALLGRIND_START_INSTRUMENTATION call, keeping init fast.
            # --collect-atstart=no: Even once instrumented, do not count until
            #   CALLGRIND_TOGGLE_COLLECT is called inside BeginOfRunAction.
            # run_profile.mac: 100 events of e- 300 MeV — enough statistics
            #   for stable per-method call ratios without excessive CI runtime.
            valgrind --tool=callgrind \
              --instr-atstart=no \
              --collect-atstart=no \
              --callgrind-out-file=callgrind.b4c.out \
              ./build/src/examples/B4c/exampleB4c \
                -m src/examples/B4c/run_profile.mac

            # ── Annotate ───────────────────────────────────────────────────
            mkdir -p reports
            cp callgrind.b4c.out reports/callgrind_b4c.out
            callgrind_annotate --auto=yes \
              --include="${PWD}/src/examples/B4c/src" \
              --include="${PWD}/src" \
              --include="${PWD}/include" \
              callgrind.b4c.out \
              > reports/callgrind_annotate_b4c.txt
            head -80 reports/callgrind_annotate_b4c.txt || true

      - name: Upload callgrind reports as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: callgrind-reports-b4c
          path: |
            reports/callgrind_annotate_b4c.txt
            reports/callgrind_b4c.out
          if-no-files-found: warn
          retention-days: 7

  report:
    name: Generate combined benchmark report
    runs-on: ubuntu-latest
    needs: [build-test-benchmark, callgrind, callgrind-assembly, callgrind-b4c]
    if: always()
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download ci-reports artifact
        uses: actions/download-artifact@v8
        with:
          name: ci-reports
          path: ci-reports/
        continue-on-error: ${{ needs.build-test-benchmark.result != 'success' }}

      - name: Download callgrind links artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: callgrind-links-*
          path: callgrind-links/
          merge-multiple: true
        continue-on-error: ${{ needs.callgrind.result != 'success' }}

      - name: Merge callgrind links and regenerate bench report
        if: always()
        run: |
          pip3 install --quiet jinja2
          # Merge all per-fixture callgrind_links_*.json files into one dict.
          python3 - <<'EOF'
          import json, glob, pathlib, sys
          merged = {}
          for f in glob.glob("callgrind-links/callgrind_links_*.json"):
              try:
                  merged.update(json.loads(pathlib.Path(f).read_text()))
              except Exception as exc:
                  print(f"Warning: could not read {f}: {exc}", file=sys.stderr)
          pathlib.Path("callgrind_links.json").write_text(json.dumps(merged))
          print(f"Merged callgrind links: {merged}")
          EOF

          # Regenerate the bench report with callgrind links if raw JSON is available.
          if [ -f ci-reports/bench_raw.json ]; then
            mkdir -p reports
            # Copy existing report files so we only overwrite bench-results.md.
            if [ -d ci-reports/reports ]; then
              cp -r ci-reports/reports/. reports/
            fi
            python3 .github/scripts/generate_bench_report.py \
              ci-reports/bench_raw.json \
              reports/bench-results.md \
              reports/point_cloud_viewer.html \
              ci-reports/reports/onshape_links.json \
              callgrind_links.json
          else
            echo "Warning: bench_raw.json not found in ci-reports artifact; skipping bench report regeneration."
          fi

      - name: Post updated bench report as step summary
        if: always()
        run: |
          if [ -f reports/bench-results.md ]; then
            cat reports/bench-results.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload regenerated bench report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-report
          path: reports/bench-results.md
          if-no-files-found: error
          retention-days: 1

      - name: Upload bench chart SVG artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-chart
          path: reports/bench-chart.svg
          if-no-files-found: warn
          archive: false
          retention-days: 1

      - name: Upload assembly bench report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-assembly-report
          path: reports/bench-assembly-results.md
          if-no-files-found: warn
          retention-days: 1

      - name: Download target-branch ci-reports artifact
        if: github.event_name == 'pull_request'
        id: download-target-bench
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: ci.yml
          branch: ${{ github.base_ref }}
          name: ci-reports
          path: target-ci-reports/
          workflow_conclusion: success
          if_no_artifact_found: ignore
        continue-on-error: true

      - name: Generate comparative OCCT benchmark report
        if: always()
        run: |
          if [ -f ci-reports/bench_raw.json ] && [ -f target-ci-reports/bench_raw.json ]; then
            mkdir -p reports
            python3 .github/scripts/generate_bench_compare_report.py \
              ci-reports/bench_raw.json \
              target-ci-reports/bench_raw.json \
              reports/bench-compare-results.md \
              reports/bench-compare-chart.svg \
              "${{ github.base_ref }}"
          else
            echo "Skipping comparative report: one or both bench_raw.json files are not available."
          fi

      - name: Post comparative bench report as step summary
        if: always()
        run: |
          if [ -f reports/bench-compare-results.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat reports/bench-compare-results.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload comparative bench chart SVG artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-compare-chart
          path: reports/bench-compare-chart.svg
          if-no-files-found: warn
          archive: false
          retention-days: 7

  sanitizer:
    name: Build and test with sanitizers (eic_xl)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # detect_leaks=1: also enable leak sanitizer via ASan
      # verify_asan_link_order=0: allow ASan in shared-library builds (Geant4/OCCT)
      # detect_stack_use_after_return=1: catch stack-use-after-return bugs
      # detect_odr_violation=1: catch one-definition-rule violations
      # new_delete_type_mismatch=0: suppress false positives from ROOT/Geant4 allocators
      # intercept_tls_get_addr=0: avoid crashes in some CVMFS-hosted libs
      ASAN_OPTIONS: suppressions=${{ github.workspace }}/.github/asan.supp:malloc_context_size=20:detect_leaks=1:verify_asan_link_order=0:detect_stack_use_after_return=1:detect_odr_violation=1:new_delete_type_mismatch=0:intercept_tls_get_addr=0
      LSAN_OPTIONS: suppressions=${{ github.workspace }}/.github/lsan.supp
      # print_stacktrace=1: print stack trace on UBSan error
      # silence_unsigned_overflow=1: suppress unsigned overflow (defined in C++)
      # report_error_type=1: include the sanitizer type in the error message
      UBSAN_OPTIONS: suppressions=${{ github.workspace }}/.github/ubsan.supp:print_stacktrace=1:silence_unsigned_overflow=1:report_error_type=1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch NIST CTC STEP fixtures
        uses: ./.github/actions/fetch-nist-ctc

      - name: Install CVMFS
        uses: cvmfs-contrib/github-action-cvmfs@v5

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: |
            _fetchcontent/*-src
            _fetchcontent/*-subbuild
          key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt') }}

      - name: Build and test with ASAN and UBSAN inside eic_xl container
        uses: eic/run-cvmfs-osg-eic-shell@v1
        with:
          platform-release: "eic_xl:nightly"
          run: |
            set -euo pipefail

            # ── Configure ──────────────────────────────────────────────────
            cmake -S . -B build \
              -DCMAKE_BUILD_TYPE=RelWithDebInfo \
              -DBUILD_TESTING=ON \
              -DBUILD_EXAMPLES=ON \
              -DUSE_ASAN=ON \
              -DUSE_UBSAN=ON \
              -DENABLE_WERROR=ON \
              -DCMAKE_INSTALL_PREFIX="${PWD}/install" \
              -DFETCHCONTENT_BASE_DIR="${PWD}/_fetchcontent"

            # ── Build ──────────────────────────────────────────────────────
            cmake --build build -- -j$(nproc)

            # ── Test ───────────────────────────────────────────────────────
            ctest --test-dir build --output-on-failure -j$(nproc)

  tsan:
    name: Build and test with thread sanitizer (eic_xl)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # halt_on_error=1: treat every race as fatal
      # second_deadlock_stack=1: print both stacks for deadlock reports
      # history_size=7: increase per-thread history for better stack traces
      TSAN_OPTIONS: suppressions=${{ github.workspace }}/.github/tsan.supp:halt_on_error=1:second_deadlock_stack=1:history_size=7

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch NIST CTC STEP fixtures
        uses: ./.github/actions/fetch-nist-ctc

      - name: Install CVMFS
        uses: cvmfs-contrib/github-action-cvmfs@v5

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: |
            _fetchcontent/*-src
            _fetchcontent/*-subbuild
          key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt') }}

      - name: Build and test with TSAN inside eic_xl container
        uses: eic/run-cvmfs-osg-eic-shell@v1
        with:
          platform-release: "eic_xl:nightly"
          run: |
            set -euo pipefail

            # ── Configure ──────────────────────────────────────────────────
            cmake -S . -B build \
              -DCMAKE_BUILD_TYPE=RelWithDebInfo \
              -DBUILD_TESTING=ON \
              -DBUILD_EXAMPLES=ON \
              -DUSE_TSAN=ON \
              -DENABLE_WERROR=ON \
              -DCMAKE_INSTALL_PREFIX="${PWD}/install" \
              -DFETCHCONTENT_BASE_DIR="${PWD}/_fetchcontent"

            # ── Build ──────────────────────────────────────────────────────
            cmake --build build -- -j$(nproc)

            # ── Test ───────────────────────────────────────────────────────
            ctest --test-dir build --output-on-failure -j$(nproc)

            # ── Run B1 with $(nproc) threads to exercise multi-threading ───
            ./build/src/examples/B1/exampleB1 \
              "${PWD}/src/examples/B1/run.mac" \
              $(nproc)

  # ── Coverage report ─────────────────────────────────────────────────────────
  coverage:
    name: Coverage report (eic_xl)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch NIST CTC STEP fixtures
        uses: ./.github/actions/fetch-nist-ctc

      - name: Install CVMFS
        uses: cvmfs-contrib/github-action-cvmfs@v5

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: |
            _fetchcontent/*-src
            _fetchcontent/*-subbuild
          key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt') }}

      - name: Build and test with coverage inside eic_xl container
        uses: eic/run-cvmfs-osg-eic-shell@v1
        with:
          platform-release: "eic_xl:nightly"
          run: |
            set -euo pipefail

            # ── Configure ──────────────────────────────────────────────────
            # Debug build: -O0 keeps line-level mappings accurate.
            # USE_COVERAGE adds --coverage (= -fprofile-arcs -ftest-coverage)
            # plus -fno-inline and -fno-omit-frame-pointer.
            cmake -S . -B build \
              -DCMAKE_BUILD_TYPE=Debug \
              -DBUILD_TESTING=ON \
              -DUSE_COVERAGE=ON \
              -DFETCHCONTENT_BASE_DIR="${PWD}/_fetchcontent"

            # ── Build ──────────────────────────────────────────────────────
            cmake --build build -- -j$(nproc)

            # ── Test ───────────────────────────────────────────────────────
            # Capture the exit code so that gcovr always runs (collecting
            # coverage from any tests that did execute) while still failing
            # the job if tests fail.
            set +e
            ctest --test-dir build --output-on-failure -j$(nproc)
            CTEST_EXIT=$?
            set -e

            # ── Generate coverage data ─────────────────────────────────────
            # The eic_xl container file system is read-only; install gcovr into
            # a virtual environment in the writable workspace directory.
            python3 -m venv "${PWD}/.venv-gcovr"
            "${PWD}/.venv-gcovr/bin/pip" install --quiet gcovr

            mkdir -p coverage reports

            # Resolve the canonical (symlink-free) absolute path of the project
            # root, used only for --root (controls display paths in the HTML
            # report, not filtering).  Inside the Singularity container the CWD
            # may be accessed through a bind-mount that does not preserve the
            # host symlink chain, so the path cmake and GCC record in .gcno
            # files may differ from what realpath(1) returns.  Anchoring
            # --filter to an absolute prefix is therefore unreliable; instead
            # use patterns that match on the project-relative path components
            # alone (starting with / so gcovr treats them as absolute-path
            # regexes, with .* absorbing whatever prefix the build system used).
            ROOT=$(realpath .)

            # Include only project library sources; exclude tests, benchmarks,
            # examples, and any third-party headers caught by --coverage.
            "${PWD}/.venv-gcovr/bin/gcovr" \
              --root "${ROOT}" \
              --filter '/.*/src/G4OCCT[^/]*' \
              --filter '/.*/include/G4OCCT/.*' \
              --html-details coverage/index.html \
              --json-summary coverage-summary.json \
              --print-summary \
              build/

            # Propagate test failures after coverage data has been collected.
            exit $CTEST_EXIT

      - name: Generate coverage Markdown report
        if: always()
        run: |
          mkdir -p reports
          if [ -f coverage-summary.json ]; then
            python3 .github/scripts/generate_coverage_report.py \
              coverage-summary.json reports/coverage.md
          else
            {
              echo "## 📊 Coverage Report"
              echo ""
              echo "Coverage summary unavailable — \`coverage-summary.json\` was not generated."
              echo "This typically means an earlier build, test, or coverage step failed before data could be collected."
            } > reports/coverage.md
          fi

      - name: Post coverage as step summary
        if: always()
        run: |
          if [ -f reports/coverage.md ]; then
            cat reports/coverage.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage HTML report as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload coverage Markdown report as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-md-report
          path: reports/coverage.md
          if-no-files-found: warn
          retention-days: 1

  # ── Build Doxygen API reference ─────────────────────────────────────────────
  doxygen:
    name: Build Doxygen API reference
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: [build-test-benchmark]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Doxygen
        run: sudo apt-get install -y doxygen

      - name: Generate API documentation
        run: doxygen Doxyfile

      - name: Upload API docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: doxygen-api
          path: docs/api/
          retention-days: 1

  # ── Deploy docsify + Doxygen + reports to GitHub Pages ──────────────────────
  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: [build-test-benchmark, doxygen, coverage, report]
    runs-on: ubuntu-latest
    concurrency:
      group: "pages"
      cancel-in-progress: true
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Doxygen API docs
        uses: actions/download-artifact@v8
        with:
          name: doxygen-api
          path: docs/api/

      - name: Download test and benchmark reports
        uses: actions/download-artifact@v8
        with:
          name: ci-reports
          path: docs/

      - name: Download regenerated bench report
        uses: actions/download-artifact@v8
        with:
          name: bench-report
          path: docs/reports/

      - name: Download bench chart SVG
        uses: actions/download-artifact@v8
        with:
          name: bench-chart
          path: docs/reports/
        continue-on-error: true

      - name: Download assembly bench report
        uses: actions/download-artifact@v8
        with:
          name: bench-assembly-report
          path: docs/reports/
        continue-on-error: true

      - name: Download coverage HTML report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: docs/coverage/

      - name: Download coverage Markdown report
        uses: actions/download-artifact@v8
        with:
          name: coverage-md-report
          path: docs/reports/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
