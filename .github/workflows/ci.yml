name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test-benchmark:
    name: Build, test, and benchmark (eic_xl)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache NIST CTC STEP fixtures
        id: cache-nist-ctc
        uses: actions/cache@v4
        with:
          path: src/tests/fixtures/geometry/nist-ctc/G4OCCTSolid
          key: nist-ctc-step-v1-${{ hashFiles('src/tests/fixtures/geometry/nist-ctc/fetch.sh') }}

      - name: Download NIST CTC STEP fixtures
        if: steps.cache-nist-ctc.outputs.cache-hit != 'true'
        run: bash src/tests/fixtures/geometry/nist-ctc/fetch.sh
        continue-on-error: true

      - name: Install CVMFS
        uses: cvmfs-contrib/github-action-cvmfs@v5

      - name: Build, test, and install inside eic_xl container
        uses: eic/run-cvmfs-osg-eic-shell@v1
        with:
          platform-release: "eic_xl:nightly"
          run: |
            set -euo pipefail

            # ── Configure ──────────────────────────────────────────────────
            cmake -S . -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_TESTING=ON \
              -DBUILD_BENCHMARKS=ON \
              -DBUILD_EXAMPLES=ON \
              -DENABLE_WERROR=ON \
              -DCMAKE_INSTALL_PREFIX="${PWD}/install"

            # ── Build ──────────────────────────────────────────────────────
            cmake --build build -- -j$(nproc)

            # ── Test ───────────────────────────────────────────────────────
            ctest --test-dir build --output-on-failure -j$(nproc)

            # ── Install ────────────────────────────────────────────────────
            cmake --install build

  sanitizer:
    name: Build and test with sanitizers (eic_xl)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # detect_leaks=1: also enable leak sanitizer via ASan
      # verify_asan_link_order=0: allow ASan in shared-library builds (Geant4/OCCT)
      # detect_stack_use_after_return=1: catch stack-use-after-return bugs
      # detect_odr_violation=1: catch one-definition-rule violations
      # new_delete_type_mismatch=0: suppress false positives from ROOT/Geant4 allocators
      # intercept_tls_get_addr=0: avoid crashes in some CVMFS-hosted libs
      ASAN_OPTIONS: suppressions=${{ github.workspace }}/.github/asan.supp:malloc_context_size=20:detect_leaks=1:verify_asan_link_order=0:detect_stack_use_after_return=1:detect_odr_violation=1:new_delete_type_mismatch=0:intercept_tls_get_addr=0
      LSAN_OPTIONS: suppressions=${{ github.workspace }}/.github/lsan.supp
      # print_stacktrace=1: print stack trace on UBSan error
      # silence_unsigned_overflow=1: suppress unsigned overflow (defined in C++)
      # report_error_type=1: include the sanitizer type in the error message
      UBSAN_OPTIONS: suppressions=${{ github.workspace }}/.github/ubsan.supp:print_stacktrace=1:silence_unsigned_overflow=1:report_error_type=1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache NIST CTC STEP fixtures
        id: cache-nist-ctc
        uses: actions/cache@v4
        with:
          path: src/tests/fixtures/geometry/nist-ctc/G4OCCTSolid
          key: nist-ctc-step-v1-${{ hashFiles('src/tests/fixtures/geometry/nist-ctc/fetch.sh') }}

      - name: Download NIST CTC STEP fixtures
        if: steps.cache-nist-ctc.outputs.cache-hit != 'true'
        run: bash src/tests/fixtures/geometry/nist-ctc/fetch.sh
        continue-on-error: true

      - name: Install CVMFS
        uses: cvmfs-contrib/github-action-cvmfs@v5

      - name: Build and test with ASAN and UBSAN inside eic_xl container
        uses: eic/run-cvmfs-osg-eic-shell@v1
        with:
          platform-release: "eic_xl:nightly"
          run: |
            set -euo pipefail

            # ── Configure ──────────────────────────────────────────────────
            cmake -S . -B build \
              -DCMAKE_BUILD_TYPE=RelWithDebInfo \
              -DBUILD_TESTING=ON \
              -DBUILD_EXAMPLES=ON \
              -DUSE_ASAN=ON \
              -DUSE_UBSAN=ON \
              -DENABLE_WERROR=ON \
              -DCMAKE_INSTALL_PREFIX="${PWD}/install"

            # ── Build ──────────────────────────────────────────────────────
            cmake --build build -- -j$(nproc)

            # ── Test ───────────────────────────────────────────────────────
            ctest --test-dir build --output-on-failure -j$(nproc)
