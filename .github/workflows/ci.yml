name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master", "**"]

jobs:
  build-and-test:
    name: Build and test (eic_ci)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build, test, and install inside eic_ci container
        uses: eic/run-cvmfs-osg-eic-shell@main
        with:
          platform-release: "jug_xl:nightly"
          run: |
            set -euo pipefail

            # ── Configure ──────────────────────────────────────────────────
            cmake -S . -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_TESTING=ON \
              -DBUILD_BENCHMARKS=OFF \
              -DCMAKE_INSTALL_PREFIX="${PWD}/install"

            # ── Build ──────────────────────────────────────────────────────
            cmake --build build -- -j$(nproc)

            # ── Test ───────────────────────────────────────────────────────
            ctest --test-dir build --output-on-failure -j$(nproc)

            # ── Install ────────────────────────────────────────────────────
            cmake --install build

            # ── Verify downstream find_package ────────────────────────────
            cmake -S .github/downstream_test -B build_downstream \
              -DCMAKE_PREFIX_PATH="${PWD}/install" \
              -DCMAKE_BUILD_TYPE=Release
            cmake --build build_downstream -- -j$(nproc)

  build-benchmarks:
    name: Build benchmarks (eic_ci)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build with benchmarks inside eic_ci container
        uses: eic/run-cvmfs-osg-eic-shell@main
        with:
          platform-release: "jug_xl:nightly"
          run: |
            set -euo pipefail

            cmake -S . -B build_bench \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_TESTING=OFF \
              -DBUILD_BENCHMARKS=ON

            cmake --build build_bench -- -j$(nproc)
