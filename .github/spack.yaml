spack:
  view: /opt/local

  repos:
  - spack-repo

  develop:
    g4occt:
      spec: g4occt@main
      path: ..

  specs:
  - "g4occt@main +dd4hep"

  config:
    install_tree:
      root: /opt/software

  packages:
    all:
      require: 'target=x86_64_v2'

  mirrors:
    eic-buildcache:
      url: oci://ghcr.io/eic/spack-v2025.11.0
      binary: true
      signed: false
      access_pair:
        id_variable: GITHUB_USER
        secret_variable: GITHUB_TOKEN
