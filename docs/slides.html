# G4OCCT

.subtitle[CAD-to-Simulation: Geant4 meets Open CASCADE Technology]

---

**Geant4** drives particle-physics detector simulations worldwide.
**OCCT** is the premier open-source CAD geometry kernel.
**G4OCCT** bridges them вЂ” zero geometry re-entry, zero discrepancy.

.meta[
[github.com/wdconinc/G4OCCT](https://github.com/wdconinc/G4OCCT) &nbsp;В·&nbsp; LGPL-2.1-or-later
]

---

# The Problem

.col2[
.box.box-gold[
## Status Quo

- Geant4 geometry: hand-coded CSG
  *(boxes, spheres, tubes, вЂ¦)*
- Engineering designs: STEP/CAD files
- **Two separate worlds**, maintained by different teams
- Every design change needs **manual re-implementation**
- CSG can't express fillets, swept surfaces, blends
]

.box.box-blue[
## Consequences

- Geometry discrepancies between CAD and simulation
- Maintenance bottleneck slows detector studies
- Tessellated meshes lose precision at boundaries
- Long iteration cycles delay physics results
- Risk of undetected design-vs-simulation drift
]
]

---

# Why This Matters

High-energy physics detectors like **ePIC** (EIC) and future collider experiments:

- Contain **tens of thousands** of placed volumes
- Require geometry to match engineering drawings **exactly**
- Undergo frequent **incremental design revisions**
- Demand **nanosecond-level** navigation throughput

> *"The real detector looks like the CAD. The simulation should too."*

Current approaches (GDML hand-conversion, TGeo export, tessellated meshes)
all introduce manual steps that are error-prone and time-consuming.

---

# Introducing G4OCCT

.col2[
.box.box-green[
## What It Does

- Wraps OCCT **BRep shapes** as `G4VSolid` objects
- Imports STEP files вЂ” **single shape** or **full assembly**
- Bridges **material names** from STEP metadata
- Plugs into the **unmodified** Geant4 navigator
- Ships as a standard **CMake package**
]

.box[
## What It Is Not

- Not a replacement navigator
- Not a GDML exporter
- Not a GPU geometry engine *(yet)*
- Not a material database
- Not a full MCAD import stack

All listed items are explicitly **out of scope for v0.x**,
keeping the library focused and auditable.
]
]

# Architecture

.section-sub[Thin wrapper. Zero Geant4 changes.]

---

# Design Philosophy

### Thin wrapper, not a replacement

OCCT shapes live **inside** Geant4 constructs.
The navigator, scoring, and visualisation remain untouched.

```mermaid
flowchart TD
    GN["Geant4 Navigator\nG4SafetyHelper В· G4VoxelNavigator В· G4PropagatorInField"]
    GN -->|"G4VSolid virtual interface"| GOS["G4OCCTSolid  в†ђ new in G4OCCT"]
    GOS --> TDS["TopoDS_Shape  в†ђ OCCT BRep handle"]
```

Navigation queries (`Inside`, `DistanceToIn/Out`, `SurfaceNormal`)
are **delegated to OCCT BRep algorithms**.  Everything else is Geant4.

---

# Class Hierarchy

| G4OCCT class | Inherits from | Embeds | Role |
|---|---|---|---|
| `G4OCCTSolid` | `G4VSolid` | `TopoDS_Shape` | Solid geometry queries |
| `G4OCCTLogicalVolume` | `G4LogicalVolume` | `TopoDS_Shape` (opt.) | Volume with material |
| `G4OCCTPlacement` | `G4PVPlacement` | `TopLoc_Location` | Placed instance |
| `G4OCCTAssemblyVolume` | вЂ” | STEP hierarchy | Multi-shape assembly |
| `G4OCCTMaterialMap` | вЂ” | `std::map` | STEP name в†’ `G4Material*` |

Standard downstream usage:

```cmake
find_package(G4OCCT REQUIRED)
target_link_libraries(myApp PRIVATE G4OCCT::G4OCCT)
```

Dependencies (`Geant4 в‰Ґ 11.3`, `OCCT в‰Ґ 7.8`) propagate automatically.

---

# Navigation: Query Mapping

Each `G4VSolid` virtual method maps to an OCCT algorithm:

| `G4VSolid` method | OCCT algorithm | Notes |
|---|---|---|
| `Inside(p)` | Multi-stage: inscribed sphere в†’ ray-parity в†’ `BRepClass3d_SolidClassifier` fallback | Per-thread `G4Cache`; classifier only for degenerate rays |
| `DistanceToIn(p, v)` | Per-face `IntCurvesFace_Intersector` loop + AABB prefilter | Per-thread cached; no NCollection heap alloc |
| `DistanceToOut(p, v)` | Per-face `IntCurvesFace_Intersector` loop + AABB prefilter | Precomputed outward normals for planar faces |
| `DistanceToIn(p)` | BVH triangle-set lower bound (`PointToMeshDistance`) | Exact `BRepExtrema` only as fallback |
| `DistanceToOut(p)` | BVH triangle-set / plane-distance lower bound | Plane-distance for all-planar solids |
| `SurfaceNormal(p)` | `GeomAPI_ProjectPointOnSurf` | UV projection + retry on seam |
| `BoundingLimits` | `fCachedBounds` | Cached at construction; O(1) per call |

---

# STEP Assembly Import

Multi-shape STEP files are imported via **OCCT's XDE framework**:

```cpp
auto assembly = G4OCCTAssemblyVolume::FromSTEP(
    "detector.step",
    materialMap,        // STEP name в†’ G4Material*
    worldLogical);
```

.col2[
.box[
### XDE Traversal
- `STEPCAFControl_Reader` with name + material + colour modes
- Depth-first traversal of XDE label tree
- Shape в†’ `G4OCCTSolid` + `G4OCCTLogicalVolume`
- Placement в†’ `G4OCCTPlacement` with `TopLoc_Location`
]
.box[
### Prototype Caching
- Identical sub-shapes (same OCCT label) в†’ **single** `G4LogicalVolume`
- Multiple `G4PVPlacement` instances share one solid
- Memory-efficient for assemblies with repeated components
- Prototype key: XDE entry label string
]
]

---

# Material Bridging

STEP files carry material names as metadata strings.
G4OCCT maps these to `G4Material*` objects вЂ” **no silent fallbacks**.

```cpp
G4OCCTMaterialMap materials;
materials.Add("Aluminum6061",  G4NistManager::Instance()->FindOrBuildMaterial("G4_Al"));
materials.Add("StainlessSteel", G4NistManager::Instance()->FindOrBuildMaterial("G4_STAINLESS-STEEL"));

// Unmapped name в†’ G4Exception FatalException (not a warning)
auto assembly = G4OCCTAssemblyVolume::FromSTEP("part.step", materials, world);
```

**Policy: fail loudly.**
Every unmapped material name terminates the run.
Preferred alternative: use a GDML overlay (`G4GDMLParser`) to inject materials.

# Thread Safety & Performance

.section-sub[Multi-threaded Geant4 В· OCCT algorithm caching]

---

# Thread Safety

Geant4 runs **N worker threads** sharing one geometry (read-only).
OCCT algorithm objects maintain **mutable internal state** вЂ” they can't be shared.

**Solution: `G4Cache<T>` per-thread caching**

```cpp
class G4OCCTSolid : public G4VSolid {
  mutable G4Cache<ClassifierCache>  fClassifierCache;   // one per thread (fallback only)
  mutable G4Cache<IntersectorCache> fIntersectorCache;  // one per thread (per-face intersectors)
  mutable G4Cache<SphereCacheData>  fSphereCache;       // one per thread (inscribed spheres)
  std::atomic<std::uint64_t>        fShapeGeneration{0};
};
```

- O(N_faces) initialisation paid **once per thread**, not per call
- `ClassifierCache` is only invoked as a fallback for degenerate rays
- `SetOCCTShape()` atomically increments generation в†’ lazy per-thread rebuild
- `TopoDS_Shape` is a reference-counted handle в†’ safe to copy across threads

---

# Performance Profile

| Method | Native Geant4 | G4OCCTSolid (current) | Notes |
|---|---|---|---|
| `Inside` | O(1) analytic | O(1) sphere fast-path / O(N_faces) ray-parity | Classifier fallback for degenerate rays only вњ… |
| `DistanceToIn(p, v)` | O(1) analytic | O(k) ray test (k = unrejected faces) | AABB prefilter reduces k в‰Є N_faces вњ… |
| `DistanceToOut(p, v)` | O(1) analytic | O(k) ray test (k = unrejected faces) | Precomputed normals for planar вњ… |
| `DistanceToIn(p)` | O(1) analytic | O(log T) BVH lower bound | T = triangle count; exact only as fallback вњ… |
| `DistanceToOut(p)` | O(1) analytic | O(N_faces) plane-distance or O(log T) BVH | All-planar: exact plane distance вњ… |
| `BoundingLimits` | O(1) stored | O(1) cached at construction | вЂ” вњ… |

> For shapes with **в‰¤ ~20 faces**, performance is within a small constant factor
> of native solids.  Complex STEP parts (100sвЂ“1000s of faces) will be slower вЂ”
> this is a fundamental property of general BRep navigation, not a deficiency.

# Benchmarking

The `bench_navigator` tool compares native Geant4 vs. G4OCCTSolid for every registered fixture:

```bash
cmake -S . -B build -DBUILD_BENCHMARKS=ON -DCMAKE_BUILD_TYPE=Release
cmake --build build -- -j$(nproc)
./build/bench_navigator 2048   # 2048 random rays per fixture
```

Methods benchmarked per fixture:

.col2[
.box[
- `DistanceToIn(p, v)` вЂ” directional ray
- `DistanceToOut(p, v)` вЂ” directional ray
- Exit normals вЂ” from `DistanceToOut`
- `Inside(p)` вЂ” point classification
]
.box[
- `DistanceToIn(p)` вЂ” safety from outside
- `DistanceToOut(p)` вЂ” safety from inside
- `SurfaceNormal(p)` вЂ” at hit points
]
]

Output: per-method wall-clock time, **imported/native speed ratio**, correctness mismatches.
CI runs benchmarks in every PR вЂ” results published in [Benchmark Results](reports/bench-results.md) (CI-generated).

# Validation & CI

.section-sub[Correctness first. Performance second.]

---

# Test Suite

Tests live in `src/tests/` and are driven by **CTest + GoogleTest**:

.col2[
.box[
### Geometry Fixtures
- All Geant4 primitive shapes: `G4Box`, `G4Sphere`, `G4Tubs`, `G4Cons`, `G4Trd`, `G4Trap`, вЂ¦
- Each fixture: native solid vs. `G4OCCTSolid`-wrapped BRep equivalent
- NIST CTC STEP files for real-world shapes
- Navigation agreement verified to **numerical precision**
]
.box[
### What Is Validated
- `Inside` classification matches on 2048 random points
- `DistanceToIn/Out(p, v)` agrees within tolerance
- `SurfaceNormal` is consistent with reported hit points
- Assembly import reproduces correct placement hierarchy
- Expected-failure allowlist tracks known edge cases
]
]

See [Geometry Test Status](geometry_test_status.md) for per-fixture pass/fail summary.

---

# CI Pipeline

Two jobs run on every PR in the **EIC shell** container (`eic_xl:nightly`):

.col2[
.box[
### `build-test-benchmark`
```
Release build
  -DBUILD_TESTING=ON
  -DBUILD_BENCHMARKS=ON
  -Werror
```
1. Configure & build
2. `ctest --output-on-failure`
3. Run `bench_navigator` (2048 rays)
4. Run examples (B1, B4c)
5. Publish JUnit + Markdown reports
]
.box[
### `sanitizer`
```
RelWithDebInfo build
  -DUSE_ASAN=ON
  -DUSE_UBSAN=ON
```
1. Configure & build
2. `ctest --output-on-failure`

Suppression files:
`.github/asan.supp`
`.github/lsan.supp`
`.github/ubsan.supp`
]
]

# Summary

.col3[
.box.box-gold[
### Problem

CAD geometry and Geant4 simulation geometry are maintained separately, causing discrepancies and high maintenance overhead.
]
.box[
### Solution

G4OCCT wraps OCCT BRep shapes as `G4VSolid` objects, importing STEP files directly into Geant4 with no geometry re-entry.
]
.box.box-green[
### Status

Core navigation works. Per-thread caching eliminates dominant overheads. Test suite covers all G4 primitives. Assembly import ready.
]
]
