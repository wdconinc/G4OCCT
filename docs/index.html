<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>G4OCCT</title>
  <meta name="description" content="Geant4 interface to Open CASCADE Technology (OCCT) geometry definitions">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="icon" href="https://raw.githubusercontent.com/wdconinc/G4OCCT/main/docs/logo.svg" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">Loading…</div>
  <script>
    window.$docsify = {
      name: 'G4OCCT',
      repo: 'https://github.com/wdconinc/G4OCCT',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'goals.md',
      search: {
        paths: 'auto',
        placeholder: 'Search docs…',
        noData: 'No results.',
      },
      plugins: [
        function(hook) {
          hook.init(function() {
            // Redirect standalone HTML report pages so they are served directly
            // rather than being fetched and rendered as Markdown by docsify.
            // Matches: #/reports/some-page.html and #/reports/some-page.html?query=...
            var standaloneHtmlPattern = /^#\/reports\/[^?#]*\.html(\?|$)/;
            function redirectStandalonePage() {
              var hash = window.location.hash;
              if (hash.startsWith('#/api/') || standaloneHtmlPattern.test(hash)) {
                var base = window.location.pathname.replace(/[^\/]*$/, '');
                window.location.replace(base + hash.replace('#/', ''));
              }
            }
            redirectStandalonePage();
            window.addEventListener('hashchange', redirectStandalonePage);
          });
        }
      ],
    };
  </script>
  <!-- docsify core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- search plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- syntax highlighting -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-cmake.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-cpp.min.js"></script>
</body>
</html>
