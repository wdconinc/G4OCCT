schema_version: geometry-fixture-provenance/v1
fixture_id: g4hype-hype-r8-stereo20-z25-v1
generator:
  tool: DRAWEXE
  executable: /opt/local/bin/DRAWEXE
  script: generate.tcl
shape:
  geant4_class: G4Hype
  constructor:
    innerRadius_mm: 0.0
    outerRadius_mm: 8.0
    innerStereo_deg: 0.0
    outerStereo_deg: 20.0
    halfLenZ_mm: 25.0
  draw_commands:
    - "set b_val [expr {8.0 / tan(20.0 * 3.14159265358979323846 / 180.0)}]"
    - "set u_max [expr {log(25.0 / $b_val + sqrt(1.0 + (25.0 / $b_val) * (25.0 / $b_val)))}]"
    - "set r_max [expr {8.0 * cosh($u_max)}]"
    - "hyperbola hyp 0 0 0  0 -1 0  1 0 0  8 $b_val"
    - "mkedge earc hyp [expr {-$u_max}] $u_max"
    - "line lbot 0 0 -25  1 0 0"
    - "mkedge ebot lbot 0 $r_max"
    - "line ltop $r_max 0 25  -1 0 0"
    - "mkedge etop ltop 0 $r_max"
    - "revol flateral earc  0 0 0  0 0 1  360"
    - "revol fbot     ebot  0 0 0  0 0 1  360"
    - "revol ftop     etop  0 0 0  0 0 1  360"
    - "sewing shellresult 1e-3 flateral fbot ftop"
    - "mkvolume brepsolid shellresult"
    - "nurbsconvert seed_shape brepsolid"
    - "stepwrite a seed_shape shape.step"
validation:
  expected_volume_mm3: 14388.308849980505
  analytic_volume_mm3: 14388.308849980505
notes:
  - This fixture covers the solid-body G4Hype case with zero inner radius.
  - The STEP asset uses exact analytic surfaces (RATIONAL_B_SPLINE_SURFACE degree 2x2)
    generated by revolving a true OCCT Geom_Hyperbola arc around the Z axis.
  - MajorRadius a=8 (waist radius), MinorRadius b=8/tan(20 deg); parameter range u in
    [-asinh(25/b), +asinh(25/b)] maps z in [-25, +25].
  - nurbsconvert converts SURFACE_OF_REVOLUTION to a STEP-readable NURBS form while
    preserving the exact conic geometry.
