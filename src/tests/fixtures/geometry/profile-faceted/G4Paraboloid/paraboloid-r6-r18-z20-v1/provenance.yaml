schema_version: geometry-fixture-provenance/v1
fixture_id: g4paraboloid-paraboloid-r6-r18-z20-v1
generator:
  tool: DRAWEXE
  executable: /opt/local/bin/DRAWEXE
  script: generate.tcl
shape:
  geant4_class: G4Paraboloid
  constructor:
    dz_mm: 20.0
    r1_mm: 6.0
    r2_mm: 18.0
  draw_commands:
    - "parabola para 0 0 -25   0 1 0   0 0 1   1.8"
    - "mkedge eparc para 6 18"
    - "line lbot 0 0 -20  1 0 0"
    - "mkedge ebot lbot 0 6"
    - "line ltop 18 0 20  -1 0 0"
    - "mkedge etop ltop 0 18"
    - "revol flateral eparc 0 0 0  0 0 1  360"
    - "revol fbot     ebot  0 0 0  0 0 1  360"
    - "revol ftop     etop  0 0 0  0 0 1  360"
    - "sewing shellresult 1e-3 flateral fbot ftop"
    - "mkvolume brepsolid shellresult"
    - "nurbsconvert seed_shape brepsolid"
    - "stepwrite a seed_shape shape.step"
validation:
  expected_volume_mm3: 22619.46710584651
  analytic_volume_mm3: 22619.46710584651
notes:
  - The STEP asset uses exact analytic surfaces (RATIONAL_B_SPLINE_SURFACE degree 2x2)
    generated by revolving a true OCCT Geom_Parabola arc around the Z axis.
  - The parabola is parameterised as r^2 = k*(z+c) with k=7.2, c=25; focal distance F=k/4=1.8.
  - nurbsconvert converts SURFACE_OF_REVOLUTION to a STEP-readable NURBS form while
    preserving the exact conic geometry.
