schema_version: geometry-fixture-provenance/v1
fixture_id: g4multiunion-triple-box-chain-v1
generator:
  tool: DRAWEXE
  executable: /opt/local/bin/DRAWEXE
  script: generate.tcl
shape:
  geant4_class: G4MultiUnion
  draw_commands:
    - box left_box -min -6 0 0 -size 10 10 10
    - box middle_box -min 0 0 0 -size 10 10 10
    - box right_box -min 6 0 0 -size 10 10 10
    - bfuse first_pair left_box middle_box
    - bfuse multi_union_shape first_pair right_box
  component_boxes_mm:
    - min: [-6.0, 0.0, 0.0]
      size: [10.0, 10.0, 10.0]
    - min: [0.0, 0.0, 0.0]
      size: [10.0, 10.0, 10.0]
    - min: [6.0, 0.0, 0.0]
      size: [10.0, 10.0, 10.0]
validation:
  expected_volume_mm3: 2200.0
