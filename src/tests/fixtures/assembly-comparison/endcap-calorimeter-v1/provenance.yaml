schema_version: assembly-comparison-provenance/v1
fixture_id: endcap-calorimeter-v1

description: |
  5×5 grid of 40×40×200 mm lead-glass calorimeter tower modules.
  Module centres at x,y ∈ {−120,−60,0,60,120} mm with 60 mm pitch.
  Demonstrates grid replication: 25 instances of a single module shape
  sharing the same STEP PRODUCT name (CaloModule) and thus the same
  G4Material via G4OCCTMaterialMapReader.

generator:
  gdml:
    file: geometry.gdml
    description: >
      GDML reference geometry with 25 explicit physvol placements sharing
      a single CaloModuleLV in a 320×320×250 mm G4_AIR world.
  step:
    tool: DRAWEXE (generate.tcl)
    script: generate.tcl
    fallback: none
    regenerate: src/tests/fixtures/assembly-comparison/regenerate.sh
    description: >
      STEP assembly generated by DRAWEXE. A nested tcl foreach loop over
      x and y positions creates 25 independent 40×40×200 mm boxes, each
      named CaloModule, at 60 mm pitch.

geometry:
  world_mm:
    x: 320
    y: 320
    z: 250
  module_box_mm:
    x: 40
    y: 40
    z: 200
  grid:
    nx: 5
    ny: 5
    pitch_mm: 60
    centres_xy_mm: [-120, -60, 0, 60, 120]
  material_gdml: LeadGlass
  material_step_part_name: CaloModule
