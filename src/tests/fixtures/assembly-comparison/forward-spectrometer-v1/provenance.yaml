schema_version: assembly-comparison-provenance/v1
fixture_id: forward-spectrometer-v1

description: |
  Fixed-target forward spectrometer along the z-axis. Eight silicon tracking
  planes (300×300×1 mm) flank an iron dipole magnet (500×300×600 mm outer,
  100×100×600 mm gap; built via boolean subtraction) at z = 700–1300 mm.
  A lead ECAL block (400×400×300 mm) sits downstream. Demonstrates three
  distinct materials and bcut for the hollow magnet yoke.

generator:
  gdml:
    file: geometry.gdml
    description: >
      GDML reference with G4SubtractionSolid for the dipole magnet yoke,
      explicit physvol placements in a 700×700×2500 mm G4_AIR world.
  step:
    tool: DRAWEXE (generate.tcl)
    script: generate.tcl
    fallback: none
    regenerate: src/tests/fixtures/assembly-comparison/regenerate.sh
    description: >
      STEP generated by DRAWEXE. Tracking planes created in foreach loops
      at z = 0,200,400,600 and 1400,1600,1800,2000 mm. Dipole magnet
      built via bcut. Three distinct PRODUCT names: TrackingPlane,
      DipoleMagnet, ECALBlock.

geometry:
  world_mm:
    x: 700
    y: 700
    z: 2500
  tracking_planes:
    size_mm: [300, 300, 1]
    z_positions_mm: [0, 200, 400, 600, 1400, 1600, 1800, 2000]
    material_step_part_name: TrackingPlane
  dipole_magnet:
    outer_mm: [500, 300, 600]
    gap_mm: [100, 100, 600]
    z_range_mm: [700, 1300]
    material_step_part_name: DipoleMagnet
  ecal_block:
    size_mm: [400, 400, 300]
    z_range_mm: [2100, 2400]
    material_step_part_name: ECALBlock
