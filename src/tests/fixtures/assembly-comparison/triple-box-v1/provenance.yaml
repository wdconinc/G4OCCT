schema_version: assembly-comparison-provenance/v1
fixture_id: triple-box-v1

description: |
  Three 10×10×10 mm aluminium boxes placed along X with 2 mm gaps between
  adjacent boxes.  The boxes are centred at x = -12, 0, and +12 mm.

generator:
  gdml:
    file: geometry.gdml
    description: >
      GDML reference geometry; boxes defined as G4Box solids with explicit
      placements in a 50×30×30 mm G4_AIR world volume.
  step:
    tool: generate_triple_box_step
    description: >
      STEP assembly generated by the generate_triple_box_step executable
      (src/benchmarks/generate_triple_box_step.cc).  Each box is added as a
      separate free shape in an OCCT XDE document with the part name
      "Component" and exported via STEPCAFControl_Writer.

geometry:
  world_mm:
    half_x: 25
    half_y: 15
    half_z: 15
  component_box_mm: 10
  component_centers_x_mm: [-12.0, 0.0, 12.0]
  gap_between_components_mm: 2.0
  material_gdml: G4_Al
  material_step_part_name: Component
