schema_version: assembly-comparison-provenance/v1
fixture_id: triple-box-v1

description: |
  Three 10×10×10 mm aluminium boxes placed along X with 2 mm gaps between
  adjacent boxes.  The boxes are centred at x = -12, 0, and +12 mm.

generator:
  gdml:
    file: geometry.gdml
    description: >
      GDML reference geometry; boxes defined as G4Box solids with explicit
      placements in a 50×30×30 mm G4_AIR world volume.
  step:
    tool: DRAWEXE (generate.tcl) or Python (generate.py)
    script: generate.tcl
    fallback: generate.py
    regenerate: src/tests/fixtures/assembly-comparison/regenerate.sh
    description: >
      STEP assembly generated by running regenerate.sh from the repository
      root.  generate.tcl (preferred) uses DRAWEXE XDE commands (XNewDoc,
      XAddShape, XSetName, WriteStep) to write three named free shapes.
      generate.py is a pure-Python fallback that produces an equivalent
      STEP AP214 file without external tools.  Each box is a separate
      PRODUCT named "Component" so G4OCCTAssemblyVolume::FromSTEP maps
      all three to the same G4Material via a single G4OCCTMaterialMap entry.

geometry:
  world_mm:
    half_x: 25
    half_y: 15
    half_z: 15
  component_box_mm: 10
  component_centers_x_mm: [-12.0, 0.0, 12.0]
  gap_between_components_mm: 2.0
  material_gdml: G4_Al
  material_step_part_name: Component
