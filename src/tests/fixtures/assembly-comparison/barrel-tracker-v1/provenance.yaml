schema_version: assembly-comparison-provenance/v1
fixture_id: barrel-tracker-v1

description: |
  Three concentric hollow silicon cylindrical tracking layers centred at z=0.
  Layer 0: inner R=50 mm, outer R=50.5 mm, H=500 mm.
  Layer 1: inner R=80 mm, outer R=80.5 mm, H=500 mm.
  Layer 2: inner R=110 mm, outer R=110.5 mm, H=500 mm.

generator:
  gdml:
    file: geometry.gdml
    description: >
      GDML reference geometry; tubes defined as G4Tubs solids placed at the
      origin in a 270×270×600 mm G4_AIR world volume.
  step:
    tool: DRAWEXE (generate.tcl)
    script: generate.tcl
    regenerate: src/tests/fixtures/assembly-comparison/regenerate.sh
    description: >
      STEP assembly generated by running regenerate.sh from the repository
      root.  generate.tcl uses DRAWEXE commands (pcylinder, bcut, ttranslate,
      XNewDoc, XAddShape, SetName, WriteStep) to create three named hollow
      cylindrical shells.  Each shell is a separate PRODUCT named
      "TrackingLayer" so G4OCCTAssemblyVolume::FromSTEP maps all three to
      G4_Si via the materials.xml map.

geometry:
  world_mm:
    half_x: 135
    half_y: 135
    half_z: 300
  layers:
    - layer: 0
      inner_radius_mm: 50.0
      outer_radius_mm: 50.5
      thickness_mm: 0.5
      half_length_mm: 250.0
    - layer: 1
      inner_radius_mm: 80.0
      outer_radius_mm: 80.5
      thickness_mm: 0.5
      half_length_mm: 250.0
    - layer: 2
      inner_radius_mm: 110.0
      outer_radius_mm: 110.5
      thickness_mm: 0.5
      half_length_mm: 250.0
  material_gdml: G4_Si
  material_step_part_name: TrackingLayer
