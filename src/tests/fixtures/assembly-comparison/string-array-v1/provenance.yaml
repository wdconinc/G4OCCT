schema_version: assembly-comparison-provenance/v1
fixture_id: string-array-v1

description: |
  3×3 array of detector strings, each with 5 cylindrical optical modules.
  Total: 45 modules. Inspired by IceCube-like neutrino telescope geometry.
  Module: cylinder R=60 mm, H=120 mm. String pitch: 500 mm in x and y.
  Module pitch: 200 mm in z. Module centres at z ∈ {−400,−200,0,200,400} mm.
  Demonstrates large-count 3D replication: 45 instances of OpticalModule
  sharing one G4Material via G4OCCTMaterialMapReader.

generator:
  gdml:
    file: geometry.gdml
    description: >
      GDML reference with 45 explicit physvol placements sharing a single
      OpticalModuleLV in a 1300×1300×1100 mm G4_AIR world.
  step:
    tool: DRAWEXE (generate.tcl)
    script: generate.tcl
    fallback: none
    regenerate: src/tests/fixtures/assembly-comparison/regenerate.sh
    description: >
      STEP generated by DRAWEXE using three nested foreach loops over
      string positions (sx,sy) and module depths (sz). 45 pcylinder
      shapes are created, translated, and added to the XDE document
      with the PRODUCT name OpticalModule.

geometry:
  world_mm:
    x: 1300
    y: 1300
    z: 1100
  module:
    radius_mm: 60
    height_mm: 120
    material_step_part_name: OpticalModule
  strings:
    count: 9
    positions_xy_mm: [-500, 0, 500]
    pitch_mm: 500
  modules_per_string: 5
  module_z_centres_mm: [-400, -200, 0, 200, 400]
  total_modules: 45
